<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe5"/>
      <stop offset="100%" stop-color="#efe2d0"/>
    </linearGradient>

    <linearGradient id="wrapperMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e1f1f"/>
      <stop offset="45%" stop-color="#8f2a2a"/>
      <stop offset="100%" stop-color="#4f1414"/>
    </linearGradient>

    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c59d52"/>
      <stop offset="50%" stop-color="#f1d48a"/>
      <stop offset="100%" stop-color="#a57a32"/>
    </linearGradient>

    <linearGradient id="choco" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#7a4a2a"/>
      <stop offset="100%" stop-color="#3d2416"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.23"/>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- table shadow -->
  <ellipse cx="620" cy="610" rx="345" ry="95" fill="#6a4330" opacity="0.16" filter="url(#soft)"/>

  <!-- wrapped chocolate bar -->
  <g transform="translate(600 440) rotate(-13)" filter="url(#shadow)">
    <!-- left twist -->
    <g transform="translate(-320 0)">
      <path d="M0,-85
               C-55,-72 -88,-35 -96,0
               C-88,35 -55,72 0,85
               L62,55
               C35,30 22,12 22,0
               C22,-12 35,-30 62,-55 Z"
            fill="url(#foil)" stroke="#9a7538" stroke-width="4"/>
      <path d="M-8,-62 C-28,-40 -38,-20 -38,0 C-38,20 -28,40 -8,62"
            fill="none" stroke="#f7e1a5" stroke-width="5" opacity="0.8"/>
      <path d="M18,-56 C2,-34 -6,-17 -6,0 C-6,17 2,34 18,56"
            fill="none" stroke="#8d6a31" stroke-width="4" opacity="0.55"/>
    </g>

    <!-- right twist -->
    <g transform="translate(320 0) scale(-1 1)">
      <path d="M0,-85
               C-55,-72 -88,-35 -96,0
               C-88,35 -55,72 0,85
               L62,55
               C35,30 22,12 22,0
               C22,-12 35,-30 62,-55 Z"
            fill="url(#foil)" stroke="#9a7538" stroke-width="4"/>
      <path d="M-8,-62 C-28,-40 -38,-20 -38,0 C-38,20 -28,40 -8,62"
            fill="none" stroke="#f7e1a5" stroke-width="5" opacity="0.8"/>
      <path d="M18,-56 C2,-34 -6,-17 -6,0 C-6,17 2,34 18,56"
            fill="none" stroke="#8d6a31" stroke-width="4" opacity="0.55"/>
    </g>

    <!-- main wrapper -->
    <rect x="-305" y="-110" width="610" height="220" rx="34"
          fill="url(#wrapperMain)" stroke="#3a0d0d" stroke-width="6"/>
    <!-- tapered wrapper side panels -->
    <path d="M-305,-92
             C-338,-78 -360,-42 -365,0
             C-360,42 -338,78 -305,92
             L-275,70
             C-290,48 -297,24 -297,0
             C-297,-24 -290,-48 -275,-70 Z"
          fill="#5c1818" opacity="0.95" stroke="#3a0d0d" stroke-width="4"/>
    <path d="M305,-92
             C338,-78 360,-42 365,0
             C360,42 338,78 305,92
             L275,70
             C290,48 297,24 297,0
             C297,-24 290,-48 275,-70 Z"
          fill="#5c1818" opacity="0.95" stroke="#3a0d0d" stroke-width="4"/>

    <!-- center label plate -->
    <rect x="-178" y="-68" width="356" height="136" rx="24"
          fill="#f5e3bd" stroke="#c49545" stroke-width="5"/>

    <!-- subtle wrapper shine -->
    <path d="M-250,-95 C-160,-130 10,-130 150,-90 C45,-88 -95,-76 -230,-48 Z"
          fill="#ffffff" opacity="0.12"/>

    <!-- chocolate illustration -->
    <g transform="translate(-278 -6) scale(1.14)">
      <rect x="0" y="-48" width="120" height="96" rx="18"
            fill="url(#choco)" stroke="#2f1b11" stroke-width="4"/>
      <path d="M18,-18 h84 M18,10 h84 M40,-42 v84 M80,-42 v84"
            stroke="#9a6a42" stroke-width="4" opacity="0.65"/>
      <path d="M88,-48 l32,-18 v96 l-32,18 z"
            fill="#5b341d" stroke="#2f1b11" stroke-width="4"/>
      <path d="M18,-48 l32,-18 h84 l-32,18 z"
            fill="#8e5b35" stroke="#2f1b11" stroke-width="4"/>
      <!-- coordinate-like dots -->
      <g fill="#caa27a" opacity="0.9">
        <circle cx="28" cy="-28" r="3.2"/>
        <circle cx="56" cy="-8" r="2.8"/>
        <circle cx="72" cy="20" r="3.2"/>
        <circle cx="96" cy="-20" r="2.6"/>
        <circle cx="102" cy="12" r="3"/>
        <circle cx="44" cy="30" r="2.5"/>
      </g>
      <g fill="#2a160e" opacity="0.45">
        <circle cx="30" cy="-26" r="1.1"/>
        <circle cx="58" cy="-6" r="1"/>
        <circle cx="74" cy="22" r="1.1"/>
        <circle cx="98" cy="-18" r="1"/>
        <circle cx="104" cy="14" r="1"/>
        <circle cx="46" cy="32" r="0.9"/>
      </g>
    </g>

    <!-- brand text -->
    <text x="14" y="24"
          text-anchor="middle"
          font-family="Verdana, Arial, sans-serif"
          font-size="98"
          font-weight="900"
          letter-spacing="4"
          fill="#8b000f"
          stroke="#ffffff"
          stroke-width="2">TWINGS</text>
  </g>
</svg>
